capability: 1.0.0
info:
  name: IPinfo Residential Proxy Detection
  description: IPinfo residential proxy detection capability — exposes operations grouped under the OpenAPI tag 'residential proxy detection'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.residential-proxy-detection
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getResidentialProxyByIp
    method: GET
    path: "/{ip}/resproxy"
    summary: IPinfo Returns Residential Proxy Detection Information for the Selected IP
    description: "The Residential Proxy Detection API provides detailed insights into IP addresses associated with residential, mobile, or datacenter proxy networks.\nThis includes activity patterns (last seen date, percentage of days active), and proxy service identification.\nServices are suffixed with `_mobile` for"
exposes:
  rest:
    namespace: ipinfo.residential-proxy-detection
    port: 8080
    operations:
    - name: getResidentialProxyByIp
      method: GET
      path: "/{ip}/resproxy"
      consumes: getResidentialProxyByIp
  mcp:
    namespace: ipinfo.residential-proxy-detection
    tools:
    - name: getResidentialProxyByIp
      description: IPinfo Returns Residential Proxy Detection Information for the Selected IP
      consumes: getResidentialProxyByIp
