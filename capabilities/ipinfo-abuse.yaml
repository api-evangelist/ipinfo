capability: 1.0.0
info:
  name: IPinfo Abuse
  description: IPinfo abuse capability — exposes operations grouped under the OpenAPI tag 'abuse'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.abuse
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getAbuse
    method: GET
    path: "/{ip}/abuse"
    summary: IPinfo Returns Data Containing Information Belonging to the Abuse Contact of the IP Address
    description: "The IP to abuse contact information API endpoint provides detailed information about the abuse contact associated with a specific IP address.\nThe response includes the abuse contact's name, email address, postal address, city, state, country, phone number, and the network associated with the IP."
exposes:
  rest:
    namespace: ipinfo.abuse
    port: 8080
    operations:
    - name: getAbuse
      method: GET
      path: "/{ip}/abuse"
      consumes: getAbuse
  mcp:
    namespace: ipinfo.abuse
    tools:
    - name: getAbuse
      description: IPinfo Returns Data Containing Information Belonging to the Abuse Contact of the IP Address
      consumes: getAbuse
