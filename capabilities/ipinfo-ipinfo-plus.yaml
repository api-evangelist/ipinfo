capability: 1.0.0
info:
  name: IPinfo Ipinfo Plus
  description: IPinfo ipinfo plus capability — exposes operations grouped under the OpenAPI tag 'ipinfo plus'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.ipinfo-plus
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getCurrentPlusInformation
    method: GET
    path: "/plus/me"
    summary: IPinfo Returns Plus IP Information About the Current IP
    description: Returns comprehensive plus IP information about the current IP including enhanced geolocation, ASN details, mobile/carrier information, anonymity detection, and various IP characteristics.
  - name: getPlusInformationByIp
    method: GET
    path: "/plus/{ip}"
    summary: IPinfo Returns Plus IP Information About the Provided IP
    description: Returns comprehensive plus IP information about the provided IP including enhanced geolocation, ASN details, mobile/carrier information, anonymity detection, and various IP characteristics.
  - name: getCurrentPlusField
    method: GET
    path: "/plus/me/{field}"
    summary: IPinfo Returns a Specific Field from Plus IP Information About the Current IP
    description: Returns a specific field from plus IP information about the current IP.
  - name: getPlusFieldByIp
    method: GET
    path: "/plus/{ip}/{field}"
    summary: IPinfo Returns a Specific Field from Plus IP Information About the Provided IP
    description: Returns a specific field from plus IP information about the provided IP.
exposes:
  rest:
    namespace: ipinfo.ipinfo-plus
    port: 8080
    operations:
    - name: getCurrentPlusInformation
      method: GET
      path: "/plus/me"
      consumes: getCurrentPlusInformation
    - name: getPlusInformationByIp
      method: GET
      path: "/plus/{ip}"
      consumes: getPlusInformationByIp
    - name: getCurrentPlusField
      method: GET
      path: "/plus/me/{field}"
      consumes: getCurrentPlusField
    - name: getPlusFieldByIp
      method: GET
      path: "/plus/{ip}/{field}"
      consumes: getPlusFieldByIp
  mcp:
    namespace: ipinfo.ipinfo-plus
    tools:
    - name: getCurrentPlusInformation
      description: IPinfo Returns Plus IP Information About the Current IP
      consumes: getCurrentPlusInformation
    - name: getPlusInformationByIp
      description: IPinfo Returns Plus IP Information About the Provided IP
      consumes: getPlusInformationByIp
    - name: getCurrentPlusField
      description: IPinfo Returns a Specific Field from Plus IP Information About the Current IP
      consumes: getCurrentPlusField
    - name: getPlusFieldByIp
      description: IPinfo Returns a Specific Field from Plus IP Information About the Provided IP
      consumes: getPlusFieldByIp
