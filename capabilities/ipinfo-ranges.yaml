capability: 1.0.0
info:
  name: IPinfo Ranges
  description: IPinfo ranges capability — exposes operations grouped under the OpenAPI tag 'ranges'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.ranges
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getRanges
    method: GET
    path: "/ranges/{domain}"
    summary: IPinfo Returns Information About a Domain Ranges
    description: The IP address ranges API endpoint provides information about IP address ranges assigned to or operated by a specific organization, identified by its domain name. This includes the number of IP ranges, specific IP range blocks (both IPv4 and IPv6), and any domain redirection information.
exposes:
  rest:
    namespace: ipinfo.ranges
    port: 8080
    operations:
    - name: getRanges
      method: GET
      path: "/ranges/{domain}"
      consumes: getRanges
  mcp:
    namespace: ipinfo.ranges
    tools:
    - name: getRanges
      description: IPinfo Returns Information About a Domain Ranges
      consumes: getRanges
