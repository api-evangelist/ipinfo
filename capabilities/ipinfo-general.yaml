capability: 1.0.0
info:
  name: IPinfo General
  description: IPinfo general capability — exposes operations grouped under the OpenAPI tag 'general'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.general
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getCurrentInformation
    method: GET
    path: /
    summary: IPinfo Returns IP Information About the Current IP
    description: Returns IP information about the current IP.
  - name: getInformationByIp
    method: GET
    path: "/{ip}"
    summary: IPinfo Returns Information About the Provided IP
    description: "The ipinfo.io/{ip} endpoint provides comprehensive information about a specified IP address, including geographic location (city, region, country), coordinates, postal code, and timezone.\nBased on the pricing tier, it also provides ASN (Autonomous System Number) details, associated company informati"
  - name: getMe
    method: GET
    path: "/me"
    summary: IPinfo Returns API Service Request Limit by Access Token
    description: "The `/me` API endpoint can be used to provide summary information on the access token limits, access to API products, and other related information.\nThe `/me` endpoint can be used in verifying access tokens as well."
  - name: batch
    method: POST
    path: /batch
    summary: IPinfo Bulk IPinfo API Enrichment
    description: Bulk or batch enrich IP addresses with IP information. See [documentation](https://ipinfo.io/developers/batch-enrichment-api).
  - name: summarize
    method: POST
    path: /tools/summarize-ips
    summary: IPinfo Summarize IP Addresses
    description: Get summary-level information of upto 500,000 IP addresses, including IP location on a map, IP types, privacy detection flags, top ASNs, top cities, and more. [Explore the IPinfo Summarize tool](https://ipinfo.io/tools/summarize-ips).
  - name: map
    method: POST
    path: /tools/map
    summary: IPinfo Highlight IP Addresses on a Map
    description: Visualize upto 500,000 IP addresses on an interactive map. [Explore the IPinfo Map IPs tool](https://ipinfo.io/tools/map).
exposes:
  rest:
    namespace: ipinfo.general
    port: 8080
    operations:
    - name: getCurrentInformation
      method: GET
      path: /
      consumes: getCurrentInformation
    - name: getInformationByIp
      method: GET
      path: "/{ip}"
      consumes: getInformationByIp
    - name: getMe
      method: GET
      path: "/me"
      consumes: getMe
    - name: batch
      method: POST
      path: /batch
      consumes: batch
    - name: summarize
      method: POST
      path: /tools/summarize-ips
      consumes: summarize
    - name: map
      method: POST
      path: /tools/map
      consumes: map
  mcp:
    namespace: ipinfo.general
    tools:
    - name: getCurrentInformation
      description: IPinfo Returns IP Information About the Current IP
      consumes: getCurrentInformation
    - name: getInformationByIp
      description: IPinfo Returns Information About the Provided IP
      consumes: getInformationByIp
    - name: getMe
      description: IPinfo Returns API Service Request Limit by Access Token
      consumes: getMe
    - name: batch
      description: IPinfo Bulk IPinfo API Enrichment
      consumes: batch
    - name: summarize
      description: IPinfo Summarize IP Addresses
      consumes: summarize
    - name: map
      description: IPinfo Highlight IP Addresses on a Map
      consumes: map
