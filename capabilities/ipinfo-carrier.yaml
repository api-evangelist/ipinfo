capability: 1.0.0
info:
  name: IPinfo Carrier
  description: IPinfo carrier capability — exposes operations grouped under the OpenAPI tag 'carrier'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.carrier
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getCarrier
    method: GET
    path: "/{ip}/carrier"
    summary: IPinfo Detects if the IP Address is Being Used in a Mobile Carrier Network. it Returns the Mobile Country Code (MCC), Mobile Network Code (MNC), and the Originating Country of the Carrier
    description: Detects if the IP address is being used in a mobile carrier network. This API endpoint can be used to detect the usage of a phone device through an IP address. It returns the Mobile Country Code (MCC), Mobile Network Code (MNC), and the originating country of the carrier.
exposes:
  rest:
    namespace: ipinfo.carrier
    port: 8080
    operations:
    - name: getCarrier
      method: GET
      path: "/{ip}/carrier"
      consumes: getCarrier
  mcp:
    namespace: ipinfo.carrier
    tools:
    - name: getCarrier
      description: IPinfo Detects if the IP Address is Being Used in a Mobile Carrier Network. it Returns the Mobile Country Code (MCC), Mobile Network Code (MNC), and the Originating Country of the Carrier
      consumes: getCarrier
