capability: 1.0.0
info:
  name: IPinfo Privacy Detection
  description: IPinfo privacy detection capability — exposes operations grouped under the OpenAPI tag 'privacy detection'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.privacy-detection
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getPrivacyInformationByIp
    method: GET
    path: "/{ip}/privacy"
    summary: IPinfo Returns Privacy Information About the Selected IP
    description: "The IP to Privacy Detection or Anonymous IP API provides privacy-related information about a specified IP address.\nThis includes whether the IP is associated with a VPN, proxy, Tor network, relay service, or a hosting service/data center (indicative of bots).\nThe response details the privacy status"
exposes:
  rest:
    namespace: ipinfo.privacy-detection
    port: 8080
    operations:
    - name: getPrivacyInformationByIp
      method: GET
      path: "/{ip}/privacy"
      consumes: getPrivacyInformationByIp
  mcp:
    namespace: ipinfo.privacy-detection
    tools:
    - name: getPrivacyInformationByIp
      description: IPinfo Returns Privacy Information About the Selected IP
      consumes: getPrivacyInformationByIp
