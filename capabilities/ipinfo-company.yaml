capability: 1.0.0
info:
  name: IPinfo Company
  description: IPinfo company capability — exposes operations grouped under the OpenAPI tag 'company'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.company
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getCompany
    method: GET
    path: "/{ip}/company"
    summary: IPinfo Returns Information About the Company That Operates or is Assigned the IP Address
    description: Returns information of the organization that is operating an IP address such as name, organization type and their official domain.
exposes:
  rest:
    namespace: ipinfo.company
    port: 8080
    operations:
    - name: getCompany
      method: GET
      path: "/{ip}/company"
      consumes: getCompany
  mcp:
    namespace: ipinfo.company
    tools:
    - name: getCompany
      description: IPinfo Returns Information About the Company That Operates or is Assigned the IP Address
      consumes: getCompany
