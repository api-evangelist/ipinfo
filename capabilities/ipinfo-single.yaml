capability: 1.0.0
info:
  name: IPinfo Single
  description: IPinfo single capability — exposes operations grouped under the OpenAPI tag 'single'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.single
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getCurrentIp
    method: GET
    path: "/ip"
    summary: IPinfo Returns the Current IP
    description: Returns the current public/external IP address.
  - name: getIpByIp
    method: GET
    path: "/{ip}/ip"
    summary: IPinfo Returns a IP for the Selected IP
    description: Returns a ip for the selected IP.
  - name: getCurrentHostname
    method: GET
    path: "/hostname"
    summary: IPinfo Returns the Current Hostname
    description: Returns the current hostname.
  - name: getHostnameByIp
    method: GET
    path: "/{ip}/hostname"
    summary: IPinfo Returns a Hostname for the Selected IP
    description: Returns a hostname for the selected IP.
  - name: getCurrentCity
    method: GET
    path: "/city"
    summary: IPinfo Returns the Current City
    description: Returns the current city.
  - name: getCityByIp
    method: GET
    path: "/{ip}/city"
    summary: IPinfo Returns a City for the Selected IP
    description: Returns a city for the selected IP.
  - name: getCurrentRegion
    method: GET
    path: "/region"
    summary: IPinfo Returns the Current Region
    description: Returns the current region. If the region is not available, it will return an empty string.
  - name: getRegionByIp
    method: GET
    path: "/{ip}/region"
    summary: IPinfo Returns a Region for the Selected IP
    description: Returns a region for the selected IP. If the region is not available, it will return an empty string.
  - name: getCurrentCountry
    method: GET
    path: "/country"
    summary: IPinfo Returns the Current Country
    description: Returns a concise response consisting of a two-letter country code. If the country is not available, it will return an empty string.
  - name: getCountryByIp
    method: GET
    path: "/{ip}/country"
    summary: IPinfo Returns a Country for the Selected IP
    description: Returns a country for the selected IP in two letter ISO-3166 format. If the country is not available, it will return an empty string.
  - name: getCurrentLocation
    method: GET
    path: "/loc"
    summary: IPinfo Returns the Current Location
    description: The '/loc' API endpoint provides the geographical location of a user's IP address in a response with latitude and longitude in comma-separated text format.
  - name: getLocationByIp
    method: GET
    path: "/{ip}/loc"
    summary: IPinfo GET a Location for the Selected IP
    description: The '/loc' API endpoint provides the geographic location of an IP address as latitude and longitude separated by a comma in text form.
  - name: getCurrentPostal
    method: GET
    path: "/postal"
    summary: IPinfo Returns the Current Postal Code or Zip Code
    description: The `/postal` API endpoint provides a straightforward method for retrieving the current postal code or zip code. When this endpoint is queried, the API responds with a simple string indicating the postal code for the current IP address.
  - name: getPostalByIp
    method: GET
    path: "/{ip}/postal"
    summary: IPinfo Returns a Postal for the Selected IP
    description: The `/postal` API lets users input an IP address to get back the corresponding postal or zip code in a simple string format.
  - name: getCurrentTimezone
    method: GET
    path: "/timezone"
    summary: IPinfo Returns the Current Timezone
    description: The '/timezone' API endpoint returns the user's timezone based on their IP address in IANA format.
  - name: getTimezoneByIp
    method: GET
    path: "/{ip}/timezone"
    summary: IPinfo Returns a Timezone for the Selected IP
    description: The `/timezone` API endpoint returns the IANA timezone based on the user's input IP address.
  - name: getCurrentOrganization
    method: GET
    path: "/org"
    summary: IPinfo Returns the Current ASN and as Organization
    description: The '/org' API endpoint identifies the Autonomous System Number (ASN) and ASN organization associated with the user's IP address. When called, the API returns a string with the ASN (prefixed by 'AS') and organization name.
  - name: getOrganizationByIp
    method: GET
    path: "/{ip}/org"
    summary: IPinfo Returns a Organization for the Selected IP
    description: The '/org' API endpoint provides the ASN and organization related to the user's input IP address. It returns a string including the ASN (prefixed by 'AS') and AS organization name.
exposes:
  rest:
    namespace: ipinfo.single
    port: 8080
    operations:
