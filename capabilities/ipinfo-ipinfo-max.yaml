capability: 1.0.0
info:
  name: IPinfo Ipinfo Max
  description: IPinfo ipinfo max capability — exposes operations grouped under the OpenAPI tag 'ipinfo max'.
  version: 1.0.0
  provider: IPinfo
  domain: IP Intelligence
consumes:
  namespace: ipinfo.ipinfo-max
  baseURI: https://api.ipinfo.io
  authentication:
    type: bearer
    header: Authorization
    scheme: Bearer
    envVar: IPINFO_TOKEN
  operations:
  - name: getMaxInformationByIp
    method: GET
    path: /max/{ip}
    summary: IPinfo Returns Max API Information About the Provided IP
    description: Returns the most comprehensive IP intelligence, including geolocation, ASN, privacy detection (VPN, proxy, Tor, relay, residential proxy), carrier data, and network flags for advanced threat analysis and bot detection.
exposes:
  rest:
    namespace: ipinfo.ipinfo-max
    port: 8080
    operations:
    - name: getMaxInformationByIp
      method: GET
      path: /max/{ip}
      consumes: getMaxInformationByIp
  mcp:
    namespace: ipinfo.ipinfo-max
    tools:
    - name: getMaxInformationByIp
      description: IPinfo Returns Max API Information About the Provided IP
      consumes: getMaxInformationByIp
