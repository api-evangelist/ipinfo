apis:
  - name: IPinfo Core API
    description: >-
      Unified IP intelligence REST API exposing the Lite, Core, Plus, Max,
      Enterprise, Places, ASN, Company, Carrier, Hosted Domains, Privacy
      Detection (Standard and Extended), Residential Proxy Detection, WHOIS,
      IP Ranges, Abuse Contact, Batch Enrichment, and Tools (Summarize IPs,
      Map IPs) endpoints. All endpoints share the same `api.ipinfo.io` base
      URL and the same token-based authentication.
    humanURL: https://ipinfo.io/developers
    baseURL: https://api.ipinfo.io
