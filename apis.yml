aid: ipinfo
name: IPinfo
description: >-
  IPinfo is an IP address data and intelligence platform that provides
  geolocation (country, region, city, coordinates, postal, timezone), ASN data,
  company association, mobile carrier identification, hosted domains lookup,
  privacy detection (VPN, proxy, Tor, relay, hosting), residential proxy
  detection, WHOIS, IP ranges, abuse contacts, and an IP-to-Places product.
  Data is available via a unified REST API (Lite, Core, Plus, Max, Enterprise
  tiers), a Batch Enrichment endpoint, and downloadable databases (CSV, MMDB,
  JSON, Parquet). Authentication uses access tokens via Basic Auth, Bearer
  Token, or query parameter; dual-stack IPv4/IPv6 endpoints are available.
url: https://ipinfo.io/developers
image: https://ipinfo.io/static/images/logo.svg
